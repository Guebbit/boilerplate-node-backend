# Dredd configuration – API contract / spec-conformance testing.
# Docs: https://dredd.org/en/latest/how-to-guides.html
#
# Usage:
#   1. Start the application:  npm run dev
#   2. In another terminal:    npm run test:dredd
#
# Environment variables consumed by the hooks file (.dredd/hooks.js):
#   TEST_BASE_URL       – server base URL            (default: http://localhost:3000)
#   TEST_ADMIN_EMAIL    – admin account e-mail       (default: admin@example.com)
#   TEST_ADMIN_PASSWORD – admin account password     (default: adminpassword)

dry-run: null

# Lifecycle hooks written in Node.js (CommonJS)
hookfiles: '.dredd/hooks.js'
language: nodejs

# Leave 'server' empty if you start the application manually before running dredd.
# Uncomment the lines below to let dredd start and stop the application for you:
# server: 'NODE_ENV=test npm run dev'
# server-wait: 5
server: null

init: false
custom: {}
names: false
only: []
reporter: []
output: []
header: []
sorted: false
user: null
inline-errors: false
details: false
method: []
color: true
loglevel: warning
path: []

# OpenAPI spec and target server
blueprint: openapi.yaml
endpoint: 'http://localhost:3000'
