name: CodeQL

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    schedule:
        # Catch newly-disclosed vulnerability patterns in code that hasn't changed.
        - cron: '0 5 * * 1'

jobs:
    analyze:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
            security-events: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                  languages: javascript-typescript

            - name: Perform CodeQL analysis
              uses: github/codeql-action/analyze@v3
