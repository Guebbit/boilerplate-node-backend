name: CI
on:
    pull_request:
    push:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        services:
            mongodb:
                image: mongo:8
                ports: ["27017:27017"]
            redis:
                image: redis:7
                ports: ["6379:6379"]

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run ts-check
            - run: npm run lint
            - run: npm run test:unit
            # Integration tests validate real HTTP behavior (routing, middleware, response shape).
            - run: npm run test:integration
            - run: npm run lint:openapi
