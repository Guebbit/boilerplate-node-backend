openapi: 3.0.3
info:
    title: Node Demo API
    version: "2.0.0"
    description: |
        Stable, codegen-oriented OpenAPI contract.
        Designed for multi-project, multi-language use (client/server stubs, DTOs, SDKs).
    contact:
        name: API Team

servers:
    - url: http://localhost:3000
      description: Local
    - url: https://api.example.com
      description: Production

tags:
    - name: System
    - name: Auth
    - name: Account
    - name: Users
    - name: Products
    - name: Cart
    - name: Orders

# If set, by default all operation requires an authentication
# security:
#    - bearerAuth: []

components:
    # This is a common security scheme that can be used by any operation
    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT

    parameters:
        # Common parameters
        PageParam:
            name: page
            in: query
            required: false
            schema:
                $ref: '#/components/schemas/Page'
            description: 1-based page index
        PageSizeParam:
            name: pageSize
            in: query
            required: false
            schema:
                $ref: '#/components/schemas/PageSize'
        TextParam:
            name: text
            in: query
            required: false
            schema:
                $ref: '#/components/schemas/Text'
        UserIdParam:
            name: userId
            in: query
            required: false
            schema:
                $ref: '#/components/schemas/Id'
        ProductIdParam:
            name: productId
            in: query
            required: false
            schema:
                $ref: '#/components/schemas/Id'
        # Product-related parameters
        ProductsMinPrice:
            name: minPrice
            in: query
            required: false
            schema:
                type: number
                format: double
                minimum: 0
        ProductsMaxPrice:
            name: maxPrice
            in: query
            required: false
            schema:
                type: number
                format: double
                minimum: 0
        # Specific parameters
        HardDeleteQuery:
            name: hardDelete
            in: query
            required: false
            schema:
                type: boolean
                default: false

    responses:
        Unauthorized:
            description: Unauthorized
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        Forbidden:
            description: Forbidden
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        NotFound:
            description: Resource not found
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        ValidationError:
            description: Validation failed
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ValidationErrorResponse'
        InternalError:
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'

    schemas:
        # ---------- Commons ----------
        Page:
            type: integer
            minimum: 1
            default: 1
            description: 1-based page index
        PageSize:
            type: integer
            minimum: 1
            description: Optional override; server may clamp to a max
        Id:
            type: string
            description: Resource identifier
        Text:
            type: string
            minLength: 1
            description: Free-text search string

        # ---------- Meta / envelope ----------
        PaginationMeta:
            type: object
            required: [page, pageSize, totalItems, totalPages]
            properties:
                page:
                    $ref: '#/components/schemas/Page'
                pageSize:
                    type: integer
                    minimum: 1
                    description: Page size
                totalItems:
                    type: integer
                    minimum: 0
                totalPages:
                    type: integer
                    minimum: 0

        MessageResponse:
            type: object
            required: [message]
            properties:
                message:
                    type: string

        EmptyObject:
            type: object
            additionalProperties: false

        # ---------- Error model ----------
        ErrorResponse:
            type: object
            required: [error]
            properties:
                error:
                    $ref: '#/components/schemas/ErrorDetail'
                traceId:
                    type: string
                    description: Correlation ID for support/debugging

        ErrorDetail:
            type: object
            required: [code, message]
            properties:
                code:
                    type: string
                    example: AUTH_INVALID_TOKEN
                message:
                    type: string
                details:
                    type: object
                    additionalProperties: true

        ValidationErrorResponse:
            allOf:
                - $ref: '#/components/schemas/ErrorResponse'
                - type: object
                  required: [errors]
                  properties:
                      errors:
                          type: array
                          items:
                              $ref: '#/components/schemas/FieldError'

        FieldError:
            type: object
            required: [field, message]
            properties:
                field:
                    type: string
                message:
                    type: string
                code:
                    type: string

        # ---------- Domain ----------
        AuthTokens:
            type: object
            required: [token]
            properties:
                token:
                    type: string
                    description: Access JWT
                refreshToken:
                    type: string
                    description: Refresh token if returned by backend
                expiresIn:
                    type: integer
                    description: Access token expiry in seconds

        User:
            type: object
            required: [id, email, username, admin, active]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                email:
                    type: string
                    format: email
                username:
                    type: string
                admin:
                    type: boolean
                active:
                    type: boolean
                imageUrl:
                    type: string
                    format: uri
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time

        Product:
            type: object
            required: [id, title, price, description, active]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                title:
                    type: string
                price:
                    type: number
                    format: double
                    minimum: 0
                description:
                    type: string
                active:
                    type: boolean
                imageUrl:
                    type: string
                    format: uri
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time

        CartItem:
            type: object
            required: [productId, quantity]
            properties:
                productId:
                    $ref: '#/components/schemas/Id'
                quantity:
                    type: integer
                    minimum: 1

        Order:
            type: object
            required: [id, userId, email, items, total, status]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                userId:
                    $ref: '#/components/schemas/Id'
                email:
                    type: string
                    format: email
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/CartItem'
                total:
                    type: number
                    format: double
                    minimum: 0
                status:
                    type: string
                    enum: [pending, paid, processing, shipped, delivered, cancelled]
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time

        Invoice:
            type: object
            required: [id, orderId, url]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                orderId:
                    $ref: '#/components/schemas/Id'
                url:
                    type: string
                    format: uri

        # ---------- Request DTOs AUTHENTICATION ----------
        LoginRequest:
            type: object
            additionalProperties: false
            required: [email, password]
            properties:
                email:
                    type: string
                    format: email
                password:
                    type: string
                    minLength: 8

        SignupRequest:
            type: object
            additionalProperties: false
            required: [email, username, password, passwordConfirm]
            properties:
                email:
                    type: string
                    format: email
                username:
                    type: string
                    minLength: 3
                imageUrl:
                    type: string
                    format: uri
                password:
                    type: string
                    minLength: 8
                passwordConfirm:
                    type: string
                    minLength: 8

        ResetRequest:
            type: object
            additionalProperties: false
            required: [email]
            properties:
                email:
                    type: string
                    format: email

        ResetConfirmRequest:
            type: object
            additionalProperties: false
            required: [token, password, passwordConfirm]
            properties:
                token:
                    type: string
                    description: One-time password reset token (NOT a JWT).
                password:
                    type: string
                    minLength: 8
                passwordConfirm:
                    type: string
                    minLength: 8

        # ---------- Request DTOs USERS ----------
        UsersListRequest:
            type: object
            additionalProperties: false
            properties:
                page:
                    $ref: '#/components/schemas/Page'
                pageSize:
                    $ref: '#/components/schemas/PageSize'
                text:
                    $ref: '#/components/schemas/Text'

        AddUserRequestJson:
            type: object
            additionalProperties: false
            required: [email, username, password, admin, active]
            properties:
                email:
                    type: string
                    format: email
                username:
                    type: string
                password:
                    type: string
                    minLength: 8
                admin:
                    type: boolean
                active:
                    type: boolean

        EditUserRequestJson:
            type: object
            additionalProperties: false
            required: [id]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                email:
                    type: string
                    format: email
                password:
                    type: string
                    minLength: 8

        # ---------- Request DTOs PRODUCTS ----------
        ProductListRequest:
            type: object
            additionalProperties: false
            properties:
                page:
                    $ref: '#/components/schemas/Page'
                pageSize:
                    $ref: '#/components/schemas/PageSize'
                text:
                    $ref: '#/components/schemas/Text'
                minPrice:
                    type: number
                    format: double
                    minimum: 0
                maxPrice:
                    type: number
                    format: double
                    minimum: 0

        OrdersListRequest:
            type: object
            additionalProperties: false
            properties:
                page:
                    $ref: '#/components/schemas/Page'
                pageSize:
                    $ref: '#/components/schemas/PageSize'
                userParam:
                    $ref: '#/components/schemas/Id'
                productParam:
                    $ref: '#/components/schemas/Id'
                email:
                    type: string
                    format: email

        # ---------- Request DTOs PRODUCTS ----------
        AddProductRequestJson:
            type: object
            additionalProperties: false
            required: [title, price, description, active]
            properties:
                title:
                    type: string
                price:
                    type: number
                    format: double
                    minimum: 0
                description:
                    type: string
                active:
                    type: boolean

        EditProductRequestJson:
            type: object
            additionalProperties: false
            required: [id]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                title:
                    type: string
                price:
                    type: number
                    format: double
                    minimum: 0

        EditProductByIdRequestJson:
            type: object
            additionalProperties: false
            properties:
                title:
                    type: string
                price:
                    type: number
                    format: double
                    minimum: 0

        CartItemInput:
            type: object
            additionalProperties: false
            required: [id, quantity]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                quantity:
                    type: integer
                    minimum: 1

        # ---------- Response DTOs USERS ----------
        UserListResponse:
            type: object
            required: [items, meta]
            properties:
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/User'
                meta:
                    $ref: '#/components/schemas/PaginationMeta'

        # ---------- Response DTOs PRODUCTS ----------
        ProductListResponse:
            type: object
            required: [items, meta]
            properties:
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/Product'
                meta:
                    $ref: '#/components/schemas/PaginationMeta'

        OrderListResponse:
            type: object
            required: [items, meta]
            properties:
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/Order'
                meta:
                    $ref: '#/components/schemas/PaginationMeta'

        CartResponse:
            type: object
            required: [items]
            properties:
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/CartItem'
paths:
    /:
        get:
            tags: [System]
            summary: Home
            operationId: getHome
            security: []
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MessageResponse'
                '500': { $ref: '#/components/responses/InternalError' }

    /account/login:
        post:
            tags: [Auth]
            summary: Login
            operationId: authLogin
            security: []    # means: public
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/LoginRequest'
            responses:
                '200':
                    description: Auth tokens
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AuthTokens'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '422': { $ref: '#/components/responses/ValidationError' }
                '500': { $ref: '#/components/responses/InternalError' }

    /account/signup:
        post:
            tags: [Auth]
            summary: Signup
            operationId: authSignup
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SignupRequest'
            responses:
                '201':
                    description: Created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/User'
                '422': { $ref: '#/components/responses/ValidationError' }
                '500': { $ref: '#/components/responses/InternalError' }

    # No need for {token} because that's in the GET page that gives only the form and put the token in the form hidden input.
    /account/reset:
        post:
            operationId: confirmPasswordReset
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ResetConfirmRequest'
            responses:
                '200':
                    description: Password reset
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MessageResponse'
    /users:
        get:
            tags: [Users]
            summary: List users (paginated)
            operationId: usersList
            security:
                - bearerAuth: [ ]
            parameters:
                - $ref: '#/components/parameters/PageParam'
                - $ref: '#/components/parameters/PageSizeParam'
                - $ref: '#/components/parameters/TextParam'
            responses:
                '200':
                    description: Users page
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UserListResponse'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '500': { $ref: '#/components/responses/InternalError' }
        post:
            tags: [Users]
            summary: Search users (DTO-friendly)
            operationId: usersSearch
            security:
                - bearerAuth: [ ]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UsersListRequest'
            responses:
                '200':
                    description: Users page
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UserListResponse'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '422': { $ref: '#/components/responses/ValidationError' }
                '500': { $ref: '#/components/responses/InternalError' }

    /products:
        get:
            tags: [Products]
            summary: List products (paginated)
            operationId: productsList
            parameters:
                - $ref: '#/components/parameters/PageParam'
                - $ref: '#/components/parameters/ProductsMinPrice'
                - $ref: '#/components/parameters/ProductsMaxPrice'
                - $ref: '#/components/parameters/TextParam'
            responses:
                '200':
                    description: Products page
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ProductListResponse'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '500': { $ref: '#/components/responses/InternalError' }
        # Same as above, but with JSON body, more suitable for DTOs and multi-language codegen
        post:
            tags: [Products]
            summary: Search products (DTO-friendly)
            operationId: productsSearch
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ProductListRequest'
            responses:
                '200':
                    description: Products page
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ProductListResponse'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '422': { $ref: '#/components/responses/ValidationError' }
                '500': { $ref: '#/components/responses/InternalError' }

    /cart:
        get:
            tags: [Cart]
            summary: Get cart
            operationId: cartGet
            security:
                - bearerAuth: [ ]
            responses:
                '200':
                    description: Cart items
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CartResponse'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '500': { $ref: '#/components/responses/InternalError' }
        post:
            tags: [Cart]
            summary: Add/update cart item (JSON)
            operationId: cartUpsertItem
            security:
                - bearerAuth: [ ]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CartItemInput'
            responses:
                '200':
                    description: Updated cart
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CartResponse'
                '422': { $ref: '#/components/responses/ValidationError' }
                '500': { $ref: '#/components/responses/InternalError' }

    /orders:
        get:
            tags: [Orders]
            summary: List orders (paginated)
            operationId: ordersList
            security:
                - bearerAuth: [ ]
            parameters:
                - $ref: '#/components/parameters/PageParam'
                - $ref: '#/components/parameters/PageSizeParam'
                - $ref: '#/components/parameters/UserIdParam'
                - $ref: '#/components/parameters/ProductIdParam'
                - name: email
                  in: query
                  schema: { type: string, format: email }
            responses:
                '200':
                    description: Orders page
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/OrderListResponse'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '500': { $ref: '#/components/responses/InternalError' }
        post:
            tags: [Orders]
            summary: Search orders (DTO-friendly)
            operationId: ordersSearch
            security:
                - bearerAuth: [ ]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/OrdersListRequest'
            responses:
                '200':
                    description: Orders page
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/OrderListResponse'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '422': { $ref: '#/components/responses/ValidationError' }
                '500': { $ref: '#/components/responses/InternalError' }