version: "3.9"

# Local observability stack: Tempo (tracing) + Grafana (dashboards)
# Usage: docker compose -f docker-compose.observability.yml up -d
#
# Then set the following in your .env:
#   OTEL_ENABLED=true
#   OTEL_EXPORTER=otlp
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
#
# Open Grafana at http://localhost:3000 (admin/admin)
# Add a Tempo data source pointing to http://tempo:3200

services:
  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"   # Tempo HTTP query API
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP  ← your app sends spans here

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"   # Grafana UI (using 3001 to avoid clash with the API)
    depends_on:
      - tempo

volumes:
  tempo_data:
  grafana_data:
