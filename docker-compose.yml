version: "3.9"

# FOR LOCAL DEVELOPMENT ONLY — anonymous admin auth is enabled for convenience.
# Do NOT use this configuration in production or any publicly exposed environment.
#
# Usage:
#   docker compose up -d
#
# Then add to your .env:
#   OTEL_ENABLED=true
#   OTEL_EXPORTER=otlp
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
#
# Grafana UI: http://localhost:3001 (admin/admin — change before exposing publicly)

services:
  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"   # Tempo HTTP query API
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP  ← your app sends spans here

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/tempo.yaml:ro
    ports:
      - "3001:3000"   # Grafana UI (using 3001 to avoid clash with the API)
    depends_on:
      - tempo

volumes:
  tempo_data:
  grafana_data:
