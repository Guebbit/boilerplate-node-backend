services:
    app:
        build:
            context: .
            dockerfile: .docker/Dockerfile
        restart: unless-stopped
        ports:
            - '${NODE_PORT:-3000}:${NODE_PORT:-3000}'
        environment:
            NODE_DB_DIALECT: mysql
            NODE_DB_HOST: database
            NODE_DB_PORT: 3306
            NODE_DB_NAME: ${NODE_DB_NAME:-boilerplate_mysql}
            NODE_DB_USER: ${NODE_DB_USER:-app}
            NODE_DB_PASS: ${NODE_DB_PASS:-app}
            NODE_ENV: development
        volumes:
            - .:/app:Z
            - /app/node_modules
        command: ['npm', 'run', 'dev:docker']
        depends_on:
            database:
                condition: service_healthy
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:${NODE_PORT:-3000}/']
            interval: 2m
            timeout: 5s
            retries: 3
            start_period: 10s

    database:
        image: mysql:8.4
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
            MYSQL_DATABASE: ${NODE_DB_NAME:-boilerplate_mysql}
            MYSQL_USER: ${NODE_DB_USER:-app}
            MYSQL_PASSWORD: ${NODE_DB_PASS:-app}
        volumes:
            - boilerplate_mysql_volume:/var/lib/mysql
        ports:
            - '3306:3306'
        healthcheck:
            test:
                [
                    'CMD',
                    'mysqladmin',
                    'ping',
                    '-h',
                    'localhost',
                    '-uroot',
                    '-p${MYSQL_ROOT_PASSWORD:-root}'
                ]
            interval: 10s
            timeout: 5s
            retries: 10

volumes:
    boilerplate_mysql_volume:
