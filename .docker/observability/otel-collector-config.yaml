# OpenTelemetry Collector — local dev config.
# Receives OTLP from the app (HTTP :4318 / gRPC :4317) and fans out to backends.
#
# Trace pipeline:  app → collector → Tempo (gRPC)
# Metric pipeline: app → collector → Prometheus (scrape endpoint exposed on :8889)

receivers:
    otlp:
        protocols:
            http:
                endpoint: 0.0.0.0:4318
            grpc:
                endpoint: 0.0.0.0:4317

processors:
    # Batch spans before exporting to reduce network overhead.
    batch:

exporters:
    # Forward traces to Tempo via OTLP/gRPC (internal network only).
    otlp/tempo:
        endpoint: tempo:4317
        tls:
            insecure: true

    # Expose scraped metrics so Prometheus can pull them.
    prometheus:
        endpoint: 0.0.0.0:8889

service:
    pipelines:
        traces:
            receivers: [otlp]
            processors: [batch]
            exporters: [otlp/tempo]
