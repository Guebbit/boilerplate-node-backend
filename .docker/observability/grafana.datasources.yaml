# Grafana datasource provisioning.
# Why this file exists: provisioning removes manual UI setup on every container restart.
# Local goal: auto-connect Grafana to Tempo, Prometheus, and Loki out of the box.

apiVersion: 1

datasources:
    # Tempo datasource: trace queries.
    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo:3200
      uid: tempo
      isDefault: true
      jsonData:
          httpMethod: GET
          # Enables service graph links powered by Prometheus metrics.
          serviceMap:
              datasourceUid: prometheus
          # Enables "view logs for this trace" jump into Loki.
          tracesToLogsV2:
              datasourceUid: loki
              filterByTraceID: true
              filterBySpanID: false

    # Prometheus datasource: metrics and alert rule visualizations.
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus:9090
      uid: prometheus
      jsonData:
          httpMethod: GET

    # Loki datasource: structured log search.
    - name: Loki
      type: loki
      access: proxy
      url: http://loki:3100
      uid: loki
      jsonData:
          derivedFields:
              # Turn trace_id in log lines into a clickable Tempo link.
              - datasourceUid: tempo
                matcherRegex: '"trace_id":"(\w+)"'
                name: TraceID
                url: '$${__value.raw}'
