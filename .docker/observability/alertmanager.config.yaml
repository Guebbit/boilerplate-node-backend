# Alertmanager receives alerts from Prometheus and decides notification routing.
# Why this file exists: grouping/repeat behavior belongs in Alertmanager, not Prometheus.
# Local goal: safe defaults (no external paging) while keeping full routing flow active.

global:
    # Time to wait before considering an alert resolved when updates stop.
    resolve_timeout: 5m

route:
    # Group alerts by name to avoid notification floods.
    group_by: ['alertname']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 12h
    # Default receiver for all alerts that do not match child routes.
    receiver: 'null'

receivers:
    # Local sink receiver: intentionally does not notify Slack/email/PagerDuty.
    - name: 'null'

# No inhibition rules in local baseline.
inhibit_rules: []
