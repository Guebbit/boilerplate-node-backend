# Tempo stores distributed traces.
# Why this file exists: Tempo does not auto-discover ports or storage; we define both here.
# Local goal: keep setup simple (single process + local disk) while still using real OTLP ingest.

server:
    # Tempo HTTP API/UI port inside the container network.
    http_listen_port: 3200

distributor:
    receivers:
        otlp:
            protocols:
                # App traces usually arrive via OTel Collector -> OTLP HTTP.
                http:
                    endpoint: 0.0.0.0:4318
                # Keep OTLP gRPC enabled for tooling compatibility.
                grpc:
                    endpoint: 0.0.0.0:4317

ingester:
    # How long incoming traces stay in memory blocks before flush.
    # Shorter in dev = faster visibility, less memory pressure.
    max_block_duration: 5m

compactor:
    compaction:
        # Keep traces for one day in local development.
        block_retention: 24h

storage:
    trace:
        # Use local filesystem backend for zero external dependencies in dev.
        backend: local
        wal:
            # Write-ahead log protects in-flight data if Tempo restarts.
            path: /var/tempo/wal
        local:
            # Final trace block storage path (mounted from host volume).
            path: /var/tempo/blocks
