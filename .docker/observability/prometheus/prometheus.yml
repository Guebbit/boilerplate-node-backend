# Prometheus config — local dev.
# Scrapes the app /metrics endpoint every 15 s.
# Sends alerts to Alertmanager and evaluates rule files.

global:
    scrape_interval: 15s
    evaluation_interval: 15s

# Load alert rule files.
rule_files:
    - /etc/prometheus/rules/*.yml

# Send firing alerts to Alertmanager.
alerting:
    alertmanagers:
        - static_configs:
              - targets: ['alertmanager:9093']

scrape_configs:
    # Scrape the Node.js app's prom-client /metrics endpoint.
    - job_name: api
      metrics_path: /metrics
      static_configs:
          - targets: ['app:3000']
      relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: api

    # Scrape the OTel Collector's self-metrics (optional, useful for pipeline health).
    - job_name: otel-collector
      metrics_path: /metrics
      static_configs:
          - targets: ['otel-collector:8888']
