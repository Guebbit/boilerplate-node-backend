# Alertmanager config — minimal local dev baseline.
# Routes all alerts to a catch-all null receiver (logs them only).
# Replace the null receiver with a real notifier (email, Slack, PagerDuty) for production.

global:
    # How long to wait before re-sending an already-firing alert.
    resolve_timeout: 5m

route:
    # Default grouping: one notification per alertname.
    group_by: ['alertname']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 12h
    receiver: 'null'

receivers:
    # Catch-all receiver — silently absorbs all alerts in local dev.
    - name: 'null'

inhibit_rules: []
